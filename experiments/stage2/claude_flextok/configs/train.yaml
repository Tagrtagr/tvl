# Hydra config for Stage 2 cross-modality alignment training

# Hydra runtime behavior
hydra:
  run:
    dir: .
  output_subdir: null

# Model
hidden_dim: 768
n_registers: 32
n_shared: 8
n_layers: 4
n_heads: 8
model_dropout: 0.1
nested_dropout: true
nested_dropout_mode: power_of_two  # power_of_two | uniform

# Loss
loss_type: contrastive  # contrastive | flow_matching | combined
use_flow_matching_alignment_loss: false
contrastive_weight: 1.0
preservation_weight: 0.5
flow_weight: 0.5

# Reconstruction
reconstruction_weight: 1.0
recon_base_channels: 64
recon_decoder_layers: 2
recon_loss_type: mse  # mse | l1 | smooth_l1
save_recon_images: true
recon_save_every: 1
recon_save_max_batches: 1
flow_recon_steps: 20
flow_recon_pixel_mse_weight: 1.0

# OAT-style prefix reconstruction
use_prefix_recon: false
prefix_recon_weight: 0.5

# Token type embeddings (OAT-inspired)
use_token_type_embed: true

# Stage split
stage: joint  # alignment | reconstruction | joint
alignment_checkpoint: null
decoder_type: autoregressive  # conv | autoregressive | flow_matching

# Training
batch_size: 64
epochs: 100
accum_iter: 1
lr: null
blr: 3e-4
min_lr: 0.0
warmup_epochs: 10
weight_decay: 0.05
seed: 42

# Stage 1 / backbone
stage1_checkpoint: null
tactile_model: vit_tiny_patch16_224  # vit_base_patch16_224 | vit_small_patch16_224 | vit_tiny_patch16_224
feature_backbone: encoders  # encoders | vae
vae_checkpoint: null
vae_latent_channels: 4
vae_scaling_factor: 0.18215

# Data
datasets_dir: ./.datasets
datasets: [ssvtp, hct]
subtract_background: null  # null | mean | median | background
num_workers: 10
pin_mem: true

# Output
output_dir: ./output/stage2
log_dir: null
log_name: null
resume: ""
start_epoch: 0

# Distributed
device: cuda
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: env://
dist_eval: false
