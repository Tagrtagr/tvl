alignment:
  contrastive:
    weight: 1.0
    module:
      _target_: losses.alignment_loss.CrossModalAlignmentLoss
      contrastive_weight: 1.0
      preservation_weight: 0.0
      latent_dim: ${hidden_dim}

reconstruction:
  weight: 1.0
  flow:
    module:
      _target_: losses.flow_reconstruction_loss.FlowReconstructionLoss
      loss_type: mse
      pixel_mse_weight: 1.0
      use_prefix_recon: false
      prefix_weight: 0.5
      
  pixel:
    module:
      _target_: losses.reconstruction_loss.ReconstructionLoss
      loss_type: mse
