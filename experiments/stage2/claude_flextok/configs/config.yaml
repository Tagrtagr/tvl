defaults:
  - pipeline: default
  - model: default
  - losses: default
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

# Core model dimensions
hidden_dim: 512
n_registers: 32
n_shared: 8
n_layers: 4
n_heads: 8
model_dropout: 0.1
nested_dropout: true
nested_dropout_mode: power_of_two
use_token_type_embed: true

# Decoder defaults (consumed by model group)
recon_base_channels: 64
recon_decoder_layers: 2
decoder_type: autoregressive  # conv | autoregressive | flow_matching

# Stage split
stage: joint  # alignment | reconstruction | joint
alignment_checkpoint: null

# Training
batch_size: 64
epochs: 100
accum_iter: 1
lr: null
blr: 3e-4
min_lr: 0.0
warmup_epochs: 0
weight_decay: 0.05
seed: 42

# Backbone inputs (referenced by pipeline group)
stage1_checkpoint: null
tactile_model: vit_tiny_patch16_224
feature_backbone: encoders  # encoders | vae
vae_checkpoint: null
vae_latent_channels: 4
vae_scaling_factor: 0.18215

# Data
datasets_dir: ./.datasets
datasets: [ssvtp, hct]
subtract_background: null
num_workers: 10
pin_mem: true

# Debug
debug_single_sample: false
debug_sample_selector: null
debug_max_train_samples: 1
debug_dataset_mode: repeat_cached
debug_repeat_size: 512
debug_num_workers: 0

# Recon/eval logging
save_recon_images: true
recon_save_every: 5
recon_save_max_batches: 1
flow_recon_steps: 20

# Output
output_dir: ./output/with_alignment_loss
log_dir: null
log_name: null
resume: ""
start_epoch: 0

# Distributed
device: cuda
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: env://
dist_eval: false
