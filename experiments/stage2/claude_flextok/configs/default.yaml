# Merged legacy config from configs/default.yaml into Hydra conf/

# ---- Model ----
hidden_dim: 768
n_registers: 32
n_shared: 8
n_layers: 4
n_heads: 8
model_dropout: 0.1
nested_dropout: true
nested_dropout_mode: power_of_two

# ---- Loss ----
loss_type: contrastive
contrastive_weight: 1.0
preservation_weight: 0.5
flow_weight: 0.5

# ---- Training ----
epochs: 100
batch_size: 256
accum_iter: 1
blr: 3.0e-4
min_lr: 0.0
weight_decay: 0.05
warmup_epochs: 10
seed: 42

# ---- Data ----
datasets: [ssvtp, hct]
datasets_dir: ./.datasets
num_workers: 10

# ---- Stage 1 ----
tactile_model: vit_tiny_patch16_224
stage1_checkpoint: null

# ---- Output ----
output_dir: ./output/stage2
log_name: null
